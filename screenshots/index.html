<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshots — Trelea, Inc.</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { color: #e6edf3; font-size: 1.5rem; margin-bottom: 1rem; }
    a { color: #6c8aff; text-decoration: underline; }
    a:hover { color: #8da4ff; }
    .file-list { list-style: none; padding: 0; }
    .file-list li { padding: 8px 0; border-bottom: 1px solid #21262d; }
    img.thumb {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 8px;
      border: 1px solid #30363d;
    }
  </style>
</head>
<body>
  <h1>Screenshots</h1>
  <ul class="file-list" id="files"></ul>
  <script>
    const files =
      [".DS_Store","screenshot1.png","screenshot2.png","screenshot3.png","screenshot4.png"];
    const ul = document.getElementById('files');
    files.forEach(f => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = encodeURIComponent(f);
      a.textContent = f;
      li.appendChild(a);
      const img = document.createElement('img');
      img.src = encodeURIComponent(f);
      img.className = 'thumb';
      img.loading = 'lazy';
      li.appendChild(img);
      ul.appendChild(li);
    });
  </script>
</body>
</html>
